name: Build Feeds

on:
  workflow_dispatch:
  schedule:
    # JST 10:00 / 21:00
    # UTC 01:00 / 12:00
    - cron: "0 1,12 * * 1-5"

    # JST 11:30 / 15:30
    # UTC 02:30 / 06:30
    - cron: "30 2,6 * * 1-5"

permissions:
  contents: write

jobs:
  build-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build feeds
        run: npm run build:feeds

      - name: Commit updated feeds
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/feeds.json
          if (-not (git diff --cached --quiet)) {
            git commit -m "Update disclosure feeds"
            git push
          } else {
            Write-Host "No feed changes."
          }
